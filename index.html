<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMiles - Dashboard de Producao</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d26;
  --card-border: #2a2d38;
  --text: #e4e4e7;
  --text-muted: #8b8d97;
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --livelo: #e63888;
  --smiles: #ff6b00;
  --latam: #1b0088;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  padding: 24px 32px;
  border-bottom: 1px solid var(--card-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header .updated {
  font-size: 12px;
  color: var(--text-muted);
}

.header .updated span { color: var(--green); }

.container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.kpi-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  border-radius: 12px 0 0 12px;
}

.kpi-card.livelo::before { background: var(--livelo); }
.kpi-card.smiles::before { background: var(--smiles); }
.kpi-card.latam::before { background: var(--blue); }
.kpi-card.info::before { background: var(--accent); }
.kpi-card.money::before { background: var(--green); }
.kpi-card.warn::before { background: var(--yellow); }

.kpi-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

.kpi-value.livelo { color: var(--livelo); }
.kpi-value.smiles { color: var(--smiles); }
.kpi-value.latam { color: var(--blue); }
.kpi-value.green { color: var(--green); }
.kpi-value.yellow { color: var(--yellow); }

.section-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.row { display: grid; gap: 16px; margin-bottom: 28px; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-3 { grid-template-columns: 1fr 1fr 1fr; }

.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 20px;
}

.card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }

.chart-container { position: relative; height: 260px; }

.op-table { width: 100%; border-collapse: collapse; }
.op-table th { font-size: 11px; text-transform: uppercase; color: var(--text-muted); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--card-border); }
.op-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.op-table tr:hover td { background: rgba(99,102,241,0.05); }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-gray { background: rgba(139,141,151,0.15); color: var(--text-muted); }

.status-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 12px; }
.status-bar div { height: 100%; transition: width 0.5s; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab {
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--text-muted);
  transition: all 0.2s;
}
.tab:hover { border-color: var(--accent); color: var(--text); }
.tab.active { background: var(--accent); border-color: var(--accent); color: white; }

.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.progress-label { font-size: 13px; min-width: 120px; }
.progress-bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-pct { font-size: 12px; color: var(--text-muted); min-width: 40px; text-align: right; }

@media (max-width: 900px) {
  .row-2, .row-3 { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 16px; }
}

.loading { text-align: center; padding: 100px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <h1>XMiles Dashboard</h1>
  <div class="updated">Atualizado em: <span id="updatedAt">--</span></div>
</div>

<div class="container" id="app">
  <div class="loading">Carregando dados...</div>
</div>

<script>
const fmt = (n) => n.toLocaleString('pt-BR');
const fmtK = (n) => n >= 1000000 ? (n/1000000).toFixed(1) + 'M' : n >= 1000 ? (n/1000).toFixed(0) + 'K' : n.toString();
const fmtBRL = (n) => 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits: 0});

const COLORS = {
  livelo: '#e63888', smiles: '#ff6b00', latam: '#1b0088',
  green: '#22c55e', yellow: '#eab308', red: '#ef4444',
  accent: '#6366f1', muted: '#8b8d97', cyan: '#06b6d4',
};

let DATA = null;
let selectedOperator = 'ALL';

async function loadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    DATA = await r.json();
    document.getElementById('updatedAt').textContent = DATA.updated_at;
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Erro ao carregar data.json. Execute extract_data.py primeiro.<\/div>';
  }
}

function getFiltered() {
  if (selectedOperator === 'ALL') return DATA;
  const op = DATA.operators.find(o => o.name === selectedOperator);
  if (!op) return DATA;
  return {
    ...DATA,
    totals: {
      livelo_pontos: op.livelo.total_pontos,
      smiles_milhas: op.smiles.total_milhas,
      latam_milhas: op.latam.total_milhas,
      total_contas: op.livelo.total_contas,
      clubes_ativos: op.livelo.clubes_ativos,
      clubes_pendentes: op.livelo.clubes_pendentes,
      valor_mensal_total: op.livelo.valor_mensal_clubes,
    },
    operators: [op],
  };
}

function render() {
  const d = getFiltered();
  const t = d.totals;
  const total_milhas_equiv = t.livelo_pontos + t.smiles_milhas + t.latam_milhas;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="tabs" id="tabs"><\/div>

    <div class="section-title"><span class="dot" style="background:${COLORS.accent}"><\/span> Saldos<\/div>
    <div class="kpi-grid">
      <div class="kpi-card livelo">
        <div class="kpi-label">Livelo<\/div>
        <div class="kpi-value livelo">${fmtK(t.livelo_pontos)}<\/div>
        <div class="kpi-sub">${fmt(t.livelo_pontos)} pontos<\/div>
      <\/div>
      <div class="kpi-card smiles">
        <div class="kpi-label">Smiles<\/div>
        <div class="kpi-value smiles">${fmtK(t.smiles_milhas)}<\/div>
        <div class="kpi-sub">${fmt(t.smiles_milhas)} milhas<\/div>
      <\/div>
      <div class="kpi-card latam">
        <div class="kpi-label">LATAM Pass<\/div>
        <div class="kpi-value latam">${fmtK(t.latam_milhas)}<\/div>
        <div class="kpi-sub">${fmt(t.latam_milhas)} milhas<\/div>
      <\/div>
      <div class="kpi-card info">
        <div class="kpi-label">Estoque Total<\/div>
        <div class="kpi-value" style="color:${COLORS.accent}">${fmtK(total_milhas_equiv)}<\/div>
        <div class="kpi-sub">pts + milhas (todos os programas)<\/div>
      <\/div>
    <\/div>

    <div class="section-title"><span class="dot" style="background:${COLORS.green}"><\/span> Producao<\/div>
    <div class="kpi-grid">
      <div class="kpi-card info">
        <div class="kpi-label">Total Contas<\/div>
        <div class="kpi-value" style="color:${COLORS.cyan}">${fmt(t.total_contas)}<\/div>
        <div class="kpi-sub">contas cadastradas<\/div>
      <\/div>
      <div class="kpi-card money">
        <div class="kpi-label">Clubes Ativos<\/div>
        <div class="kpi-value green">${fmt(t.clubes_ativos)}<\/div>
        <div class="kpi-sub">${((t.clubes_ativos / t.total_contas) * 100).toFixed(0)}% das contas<\/div>
      <\/div>
      <div class="kpi-card warn">
        <div class="kpi-label">Pgto Pendente<\/div>
        <div class="kpi-value yellow">${fmt(t.clubes_pendentes)}<\/div>
        <div class="kpi-sub">aguardando pagamento<\/div>
      <\/div>
      <div class="kpi-card money">
        <div class="kpi-label">Custo Mensal Clubes<\/div>
        <div class="kpi-value green">${fmtBRL(t.valor_mensal_total)}<\/div>
        <div class="kpi-sub">soma valores de clube Livelo<\/div>
      <\/div>
    <\/div>

    <div class="row row-2">
      <div class="card">
        <h3>Saldo por Programa<\/h3>
        <div class="chart-container"><canvas id="chartSaldo"><\/canvas><\/div>
      <\/div>
      <div class="card">
        <h3>Distribuicao de Clubes Livelo<\/h3>
        <div class="chart-container"><canvas id="chartClubes"><\/canvas><\/div>
      <\/div>
    <\/div>

    <div class="row row-2">
      <div class="card">
        <h3>Status das Contas (Livelo)<\/h3>
        <div class="chart-container"><canvas id="chartStatus"><\/canvas><\/div>
      <\/div>
      <div class="card">
        <h3>Status das Contas (Smiles)<\/h3>
        <div class="chart-container"><canvas id="chartStatusSmiles"><\/canvas><\/div>
      <\/div>
    <\/div>

    ${selectedOperator === 'ALL' ? `
    <div class="section-title"><span class="dot" style="background:${COLORS.cyan}"><\/span> Por Operador<\/div>
    <div class="card" style="margin-bottom:28px">
      <h3>Comparativo de Saldos<\/h3>
      <div class="chart-container" style="height:300px"><canvas id="chartOperadores"><\/canvas><\/div>
    <\/div>
    <div class="card" style="margin-bottom:28px">
      <table class="op-table">
        <thead>
          <tr>
            <th>Operador<\/th>
            <th>Contas<\/th>
            <th>Livelo (pts)<\/th>
            <th>Smiles (mi)<\/th>
            <th>LATAM (mi)<\/th>
            <th>Clubes Ativos<\/th>
            <th>Pendentes<\/th>
            <th>Custo Mensal<\/th>
          <\/tr>
        <\/thead>
        <tbody>
          ${DATA.operators.map(op => `
            <tr>
              <td style="font-weight:600">${op.name}<\/td>
              <td>${fmt(op.livelo.total_contas)}<\/td>
              <td style="color:${COLORS.livelo}">${fmtK(op.livelo.total_pontos)}<\/td>
              <td style="color:${COLORS.smiles}">${fmtK(op.smiles.total_milhas)}<\/td>
              <td style="color:#6366f1">${fmtK(op.latam.total_milhas)}<\/td>
              <td><span class="badge badge-green">${op.livelo.clubes_ativos}<\/span><\/td>
              <td><span class="badge badge-yellow">${op.livelo.clubes_pendentes}<\/span><\/td>
              <td>${fmtBRL(op.livelo.valor_mensal_clubes)}<\/td>
            <\/tr>
          `).join('')}
        <\/tbody>
      <\/table>
    <\/div>
    ` : ''}

    <div class="section-title"><span class="dot" style="background:${COLORS.yellow}"><\/span> Saude Operacional<\/div>
    <div class="card">
      <h3>Taxa de Ativacao por Programa<\/h3>
      <div id="healthBars"><\/div>
    <\/div>
  `;

  renderTabs();
  renderCharts(d);
  renderHealth(d);
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const allOps = ['ALL', ...DATA.operators.map(o => o.name)];
  tabs.innerHTML = allOps.map(name =>
    `<button class="tab ${name === selectedOperator ? 'active' : ''}" onclick="selectOp('${name}')">${name === 'ALL' ? 'Todos' : name}<\/button>`
  ).join('');
}

function selectOp(name) {
  selectedOperator = name;
  render();
}

function renderCharts(d) {
  const t = d.totals;

  new Chart(document.getElementById('chartSaldo'), {
    type: 'bar',
    data: {
      labels: ['Livelo', 'Smiles', 'LATAM'],
      datasets: [{
        data: [t.livelo_pontos, t.smiles_milhas, t.latam_milhas],
        backgroundColor: [COLORS.livelo, COLORS.smiles, '#4f46e5'],
        borderRadius: 6,
        barThickness: 48,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => fmt(ctx.raw) + (ctx.label === 'Livelo' ? ' pts' : ' mi') } }
      },
      scales: {
        y: { ticks: { color: '#8b8d97', callback: v => fmtK(v) }, grid: { color: 'rgba(255,255,255,0.04)' } },
        x: { ticks: { color: '#8b8d97' }, grid: { display: false } }
      }
    }
  });

  const clubeDist = {};
  d.operators.forEach(op => {
    Object.entries(op.livelo.distribuicao_clubes || {}).forEach(([k, v]) => {
      clubeDist[k] = (clubeDist[k] || 0) + v;
    });
  });
  const clubeLabels = Object.keys(clubeDist);
  const clubeValues = Object.values(clubeDist);
  const clubeColors = clubeLabels.map(l => {
    if (l === 'TOP') return COLORS.livelo;
    if (l === 'CLASSIC') return '#a855f7';
    if (l === 'SUPER') return COLORS.cyan;
    if (l === 'PLUS') return COLORS.green;
    return '#3f3f46';
  });

  new Chart(document.getElementById('chartClubes'), {
    type: 'doughnut',
    data: { labels: clubeLabels, datasets: [{ data: clubeValues, backgroundColor: clubeColors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: { legend: { position: 'right', labels: { color: '#e4e4e7', padding: 12, usePointStyle: true, pointStyleWidth: 8, font: { size: 12 } } } }
    }
  });

  const statusDist = {};
  d.operators.forEach(op => {
    Object.entries(op.livelo.distribuicao_status || {}).forEach(([k, v]) => {
      statusDist[k] = (statusDist[k] || 0) + v;
    });
  });
  const statusLabels = Object.keys(statusDist).sort((a,b) => statusDist[b] - statusDist[a]);
  const statusValues = statusLabels.map(l => statusDist[l]);
  const statusColors = statusLabels.map(l => {
    if (l === 'ATIVO') return COLORS.green;
    if (l.includes('PENDENTE')) return COLORS.yellow;
    if (l === 'SEM CLUBE') return '#3f3f46';
    if (l.includes('ERRO')) return COLORS.red;
    if (l.includes('CANCEL')) return COLORS.red;
    return COLORS.muted;
  });

  new Chart(document.getElementById('chartStatus'), {
    type: 'bar',
    data: { labels: statusLabels, datasets: [{ data: statusValues, backgroundColor: statusColors, borderRadius: 4, barThickness: 20 }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b8d97' }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#8b8d97', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  const smilesStatusDist = {};
  d.operators.forEach(op => {
    Object.entries(op.smiles.distribuicao_status || {}).forEach(([k, v]) => {
      smilesStatusDist[k] = (smilesStatusDist[k] || 0) + v;
    });
  });
  const sLabels = Object.keys(smilesStatusDist).sort((a,b) => smilesStatusDist[b] - smilesStatusDist[a]);
  const sValues = sLabels.map(l => smilesStatusDist[l]);
  const sColors = sLabels.map(l => {
    if (l === 'ATIVO') return COLORS.green;
    if (l.includes('PENDENTE')) return COLORS.yellow;
    if (l === 'SEM CLUBE') return '#3f3f46';
    if (l.includes('CANCEL')) return COLORS.red;
    return COLORS.muted;
  });

  new Chart(document.getElementById('chartStatusSmiles'), {
    type: 'bar',
    data: { labels: sLabels, datasets: [{ data: sValues, backgroundColor: sColors, borderRadius: 4, barThickness: 20 }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b8d97' }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#8b8d97', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  if (selectedOperator === 'ALL' && document.getElementById('chartOperadores')) {
    new Chart(document.getElementById('chartOperadores'), {
      type: 'bar',
      data: {
        labels: DATA.operators.map(o => o.name),
        datasets: [
          { label: 'Livelo', data: DATA.operators.map(o => o.livelo.total_pontos), backgroundColor: COLORS.livelo, borderRadius: 4 },
          { label: 'Smiles', data: DATA.operators.map(o => o.smiles.total_milhas), backgroundColor: COLORS.smiles, borderRadius: 4 },
          { label: 'LATAM', data: DATA.operators.map(o => o.latam.total_milhas), backgroundColor: '#4f46e5', borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#e4e4e7', usePointStyle: true, pointStyleWidth: 8, font: { size: 12 } } } },
        scales: {
          y: { stacked: false, ticks: { color: '#8b8d97', callback: v => fmtK(v) }, grid: { color: 'rgba(255,255,255,0.04)' } },
          x: { ticks: { color: '#8b8d97' }, grid: { display: false } }
        }
      }
    });
  }
}

function renderHealth(d) {
  const container = document.getElementById('healthBars');
  if (!container) return;

  const programs = [
    { name: 'Livelo', key: 'livelo', color: COLORS.livelo },
    { name: 'Smiles', key: 'smiles', color: COLORS.smiles },
  ];

  let html = '';
  programs.forEach(prog => {
    let ativos = 0, total = 0;
    d.operators.forEach(op => {
      const dist = op[prog.key].distribuicao_status || {};
      ativos += dist['ATIVO'] || 0;
      total += Object.values(dist).reduce((a,b) => a + b, 0);
    });
    const pct = total > 0 ? ((ativos / total) * 100).toFixed(1) : 0;
    html += `
      <div class="progress-row">
        <div class="progress-label">${prog.name}<\/div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${prog.color}"><\/div>
        <\/div>
        <div class="progress-pct">${pct}%<\/div>
      <\/div>
    `;
  });

  const totalContas = d.totals.total_contas;
  const totalAtivos = d.totals.clubes_ativos;
  const ativoPct = totalContas > 0 ? ((totalAtivos / totalContas) * 100).toFixed(1) : 0;
  html += `
    <div class="progress-row" style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)">
      <div class="progress-label" style="font-weight:600">Geral (Livelo)<\/div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${ativoPct}%;background:${COLORS.accent}"><\/div>
      <\/div>
      <div class="progress-pct" style="font-weight:600">${ativoPct}%<\/div>
    <\/div>
  `;

  container.innerHTML = html;
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
